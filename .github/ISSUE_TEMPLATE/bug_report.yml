name: Bug Report
description: Report a bug in pydbsec
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal code to reproduce the issue
      render: python
      placeholder: |
        from pydbsec import PyDBSec
        client = PyDBSec(app_key="...", app_secret="...")
        # ...
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Message / Traceback
      render: shell

  - type: dropdown
    id: api
    attributes:
      label: API Category
      options:
        - Domestic (국내)
        - Overseas (해외)
        - Futures (선물)
        - Auth / Token
        - Other

  - type: input
    id: version
    attributes:
      label: pydbsec version
      placeholder: "0.1.0"

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
