name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion!

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? Why is this needed?
      placeholder: "I want to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work? Code example if possible.
      render: python

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New API endpoint support
        - Model improvement
        - Performance
        - Documentation
        - Other
