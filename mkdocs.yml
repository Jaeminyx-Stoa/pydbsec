site_name: pydbsec
site_url: https://stoa-company.github.io/pydbsec
site_description: Python wrapper for DB Securities (DB증권) OpenAPI
repo_url: https://github.com/STOA-company/pydbsec
repo_name: STOA-company/pydbsec

theme:
  name: material
  language: ko
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.sections
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - API Reference:
      - Client: api/client.md
      - Domestic: api/domestic.md
      - Overseas: api/overseas.md
      - Futures: api/futures.md
      - Models: api/models.md
  - Changelog: changelog.md
